<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Space Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 800px; margin: 0 auto; }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 8px;
    }

    .card {
      background: #16162a;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 16px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 500; }

    .map-container {
      width: 100%;
      height: 320px;
      border-radius: 8px;
      margin-top: 10px;
      overflow: hidden;
    }

    #iss-map { width: 100%; height: 100%; }
    .leaflet-container { background: #0a0a1a; }
    .iss-marker-icon { font-size: 22px; line-height: 1; }

    .crew-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }

    .crew-card {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(55, 138, 221, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: #85b7eb;
      flex-shrink: 0;
    }

    .crew-name { font-size: 13px; font-weight: 500; }

    .apod-img {
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
      max-height: 340px;
      object-fit: cover;
    }

    .apod-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .apod-date { font-size: 12px; color: #888; }
    .apod-desc { font-size: 13px; color: #aaa; margin-top: 10px; line-height: 1.6; }
    .apod-credit { font-size: 12px; color: #666; margin-top: 6px; }

    .hint { font-size: 11px; color: #555; margin-top: 6px; }

    .loading { color: #666; font-size: 13px; }
    .error { color: #e24b4a; font-size: 13px; }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .refresh-btn {
      font-size: 12px;
      color: #888;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    a { color: #85b7eb; }

    .pass-form { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .pass-form input {
      flex: 1;
      min-width: 180px;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 12px;
      color: #e8e8f0;
      font-size: 14px;
      outline: none;
    }
    .pass-form input:focus { border-color: rgba(255,255,255,0.35); }
    .pass-form input::placeholder { color: #555; }
    .pass-btn {
      background: rgba(55,138,221,0.2);
      border: 0.5px solid rgba(55,138,221,0.4);
      border-radius: 8px;
      color: #85b7eb;
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .pass-btn:hover { background: rgba(55,138,221,0.35); }

    .pass-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pass-table th { color: #888; font-weight: 400; text-align: left; padding: 6px 8px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    .pass-table td { padding: 8px 8px; border-bottom: 0.5px solid rgba(255,255,255,0.05); color: #e8e8f0; }
    .pass-table tr:last-child td { border-bottom: none; }
    .pass-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .pass-tag.high { background: rgba(29,158,117,0.2); color: #5dcaa5; }
    .pass-tag.mid  { background: rgba(239,159,39,0.2);  color: #ef9f27; }
    .pass-tag.low  { background: rgba(226,75,74,0.2);   color: #e24b4a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1><i class="ti ti-rocket" aria-hidden="true"></i> Live space dashboard</h1>
      <button class="refresh-btn" onclick="loadAll()">
        <i class="ti ti-refresh"></i> Refresh
      </button>
    </div>

    <p class="section-label">ISS location</p>
    <div class="card">
      <div class="stat-grid">
        <div class="stat"><p class="stat-label">Latitude</p><p class="stat-value" id="iss-lat"><span class="loading">Loading…</span></p></div>
        <div class="stat"><p class="stat-label">Longitude</p><p class="stat-value" id="iss-lon"></p></div>
        <div class="stat"><p class="stat-label">Altitude</p><p class="stat-value" id="iss-alt"></p></div>
        <div class="stat"><p class="stat-label">Speed</p><p class="stat-value" id="iss-speed"></p></div>
      </div>
      <div class="map-container">
        <div id="iss-map"></div>
      </div>
      <p class="hint">Positions update every ~10 seconds aboard the ISS</p>
    </div>

    <p class="section-label">Who's in space right now</p>
    <div class="card">
      <div class="crew-grid" id="crew-grid"><span class="loading">Loading…</span></div>
    </div>

    <p class="section-label">ISS passes over your location</p>
    <div class="card">
      <div class="pass-form">
        <input type="text" id="location-input" placeholder="City name or lat, lon (e.g. Denver or 39.7,-104.9)" />
        <button class="pass-btn" onclick="lookupPasses()"><i class="ti ti-satellite"></i> Find passes</button>
      </div>
      <div id="passes-result"></div>
    </div>

    <p class="section-label">NASA astronomy picture of the day</p>
    <div class="card" id="apod-card">
      <span class="loading">Loading…</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script>
    function initials(name) {
      return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
    }

    async function loadISS() {
      try {
        const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
        const d = await r.json();
        document.getElementById('iss-lat').textContent = d.latitude.toFixed(2) + '°';
        document.getElementById('iss-lon').textContent = d.longitude.toFixed(2) + '°';
        document.getElementById('iss-alt').textContent = Math.round(d.altitude) + ' km';
        document.getElementById('iss-speed').textContent = Math.round(d.velocity) + ' km/h';
        drawMap(d.latitude, d.longitude);
      } catch (e) {
        document.getElementById('iss-lat').innerHTML = '<span class="error">Unavailable</span>';
      }
    }

    let issMap = null;
    let issMarker = null;

    function initMap(lat, lon) {
      issMap = L.map('iss-map', {
        center: [lat, lon],
        zoom: 2,
        zoomControl: true,
        attributionControl: true
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO',
        subdomains: 'abcd',
        maxZoom: 8,
        minZoom: 1
      }).addTo(issMap);

      const issIcon = L.divIcon({
        html: '<div style="font-size:28px;line-height:1;filter:drop-shadow(0 0 6px #e24b4a);">🛸</div>',
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      issMarker = L.marker([lat, lon], { icon: issIcon })
        .addTo(issMap)
        .bindPopup('<b>ISS</b><br>International Space Station');
    }

    function drawMap(lat, lon) {
      if (!issMap) {
        initMap(lat, lon);
      } else {
        issMarker.setLatLng([lat, lon]);
        issMap.panTo([lat, lon]);
      }
    }

    async function loadCrew() {
      try {
        const r = await fetch('http://api.open-notify.org/astros.json');
        const d = await r.json();
        const iss = d.people.filter(p => p.craft === 'ISS');
        const grid = document.getElementById('crew-grid');
        grid.innerHTML = iss.length
          ? iss.map(p => `
              <div class="crew-card">
                <div class="avatar">${initials(p.name)}</div>
                <p class="crew-name">${p.name}</p>
              </div>`).join('')
          : '<span class="loading">No ISS crew data found.</span>';
      } catch (e) {
        document.getElementById('crew-grid').innerHTML = '<span class="error">Could not load crew data.</span>';
      }
    }

    async function loadAPOD() {
      const card = document.getElementById('apod-card');
      try {
        const r = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
        const d = await r.json();
        const media = d.media_type === 'image'
          ? `<img src="${d.hdurl || d.url}" class="apod-img" alt="${d.title}" loading="lazy"/>`
          : `<p class="apod-desc">Today's entry is a video — <a href="${d.url}" target="_blank">watch it here</a>.</p>`;
        card.innerHTML = `
          <p class="apod-title">${d.title}</p>
          <p class="apod-date">${d.date}</p>
          ${media}
          <p class="apod-desc">${d.explanation.slice(0, 400)}…</p>
          ${d.copyright ? `<p class="apod-credit">Credit: ${d.copyright}</p>` : ''}
        `;
      } catch (e) {
        card.innerHTML = '<span class="error">Could not load NASA image.</span>';
      }
    }

    async function lookupPasses() {
      const input = document.getElementById('location-input').value.trim();
      const result = document.getElementById('passes-result');
      if (!input) return;
      result.innerHTML = '<span class="loading">Looking up location…</span>';

      let lat, lon, locationName;

      const coordMatch = input.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
      if (coordMatch) {
        lat = parseFloat(coordMatch[1]);
        lon = parseFloat(coordMatch[2]);
        locationName = `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      } else {
        try {
          const geo = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input)}&format=json&limit=1`);
          const gd = await geo.json();
          if (!gd.length) { result.innerHTML = '<span class="error">City not found. Try a different name or use lat, lon.</span>'; return; }
          lat = parseFloat(gd[0].lat);
          lon = parseFloat(gd[0].lon);
          locationName = gd[0].display_name.split(',').slice(0,2).join(',');
        } catch(e) {
          result.innerHTML = '<span class="error">Could not look up city. Try entering coordinates instead.</span>';
          return;
        }
      }

      result.innerHTML = '<span class="loading">Fetching pass predictions…</span>';
      try {
        const r = await fetch(`https://iss-api.polluxlabs.io/iss-pass?lat=${lat}&lon=${lon}&n=8`);
        const passes = await r.json();
        if (!passes.length) {
          result.innerHTML = '<span class="loading">No passes found.</span>';
          return;
        }
        result.innerHTML = `
          <p style="font-size:12px;color:#888;margin-bottom:10px;">Next passes over <strong style="color:#e8e8f0;">${locationName}</strong></p>
          <table class="pass-table">
            <thead><tr>
              <th>Date</th><th>Time (local)</th><th>Duration</th><th>Max elevation</th><th>Visible?</th>
            </tr></thead>
            <tbody>${passes.map(p => {
              const dt = new Date(p.rise_time * 1000);
              const el = p.max_elevation;
              const tag = el >= 40 ? 'high' : el >= 20 ? 'mid' : 'low';
              const label = el >= 40 ? 'High' : el >= 20 ? 'Medium' : 'Low';
              const dur = Math.round(p.duration / 60);
              const visible = p.visible
                ? '<span style="color:#5dcaa5;">Yes ✓</span>'
                : '<span style="color:#555;">No</span>';
              return `<tr>
                <td>${dt.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'})}</td>
                <td>${dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                <td>${dur} min</td>
                <td><span class="pass-tag ${tag}">${label} (${Math.round(el)}°)</span></td>
                <td>${visible}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
          <p style="font-size:11px;color:#555;margin-top:8px;">Elevation: how high the ISS gets above your horizon. "Visible" means the ISS is sunlit and your sky is dark enough to see it.</p>
        `;
      } catch(e) {
        result.innerHTML = '<span class="error">Could not fetch passes. Please try again.</span>';
      }
    }

    function loadAll() { loadISS(); loadCrew(); loadAPOD(); }
    loadAll();
  </script>
</body>
</html>
