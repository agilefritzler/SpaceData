<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Space Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 800px; margin: 0 auto; }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 8px;
    }

    .card {
      background: #16162a;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 16px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 500; }

    .map-container {
      width: 100%;
      height: 220px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      margin-top: 10px;
      overflow: hidden;
    }

    svg.worldmap { width: 100%; height: 100%; }

    .crew-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }

    .crew-card {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(55, 138, 221, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: #85b7eb;
      flex-shrink: 0;
    }

    .crew-name { font-size: 13px; font-weight: 500; }

    .apod-img {
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
      max-height: 340px;
      object-fit: cover;
    }

    .apod-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .apod-date { font-size: 12px; color: #888; }
    .apod-desc { font-size: 13px; color: #aaa; margin-top: 10px; line-height: 1.6; }
    .apod-credit { font-size: 12px; color: #666; margin-top: 6px; }

    .hint { font-size: 11px; color: #555; margin-top: 6px; }

    .loading { color: #666; font-size: 13px; }
    .error { color: #e24b4a; font-size: 13px; }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .refresh-btn {
      font-size: 12px;
      color: #888;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    a { color: #85b7eb; }

    .pass-form { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .pass-form input {
      flex: 1;
      min-width: 180px;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 12px;
      color: #e8e8f0;
      font-size: 14px;
      outline: none;
    }
    .pass-form input:focus { border-color: rgba(255,255,255,0.35); }
    .pass-form input::placeholder { color: #555; }
    .pass-btn {
      background: rgba(55,138,221,0.2);
      border: 0.5px solid rgba(55,138,221,0.4);
      border-radius: 8px;
      color: #85b7eb;
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .pass-btn:hover { background: rgba(55,138,221,0.35); }

    .pass-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pass-table th { color: #888; font-weight: 400; text-align: left; padding: 6px 8px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    .pass-table td { padding: 8px 8px; border-bottom: 0.5px solid rgba(255,255,255,0.05); color: #e8e8f0; }
    .pass-table tr:last-child td { border-bottom: none; }
    .pass-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .pass-tag.high { background: rgba(29,158,117,0.2); color: #5dcaa5; }
    .pass-tag.mid  { background: rgba(239,159,39,0.2);  color: #ef9f27; }
    .pass-tag.low  { background: rgba(226,75,74,0.2);   color: #e24b4a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1><i class="ti ti-rocket" aria-hidden="true"></i> Live space dashboard</h1>
      <button class="refresh-btn" onclick="loadAll()">
        <i class="ti ti-refresh"></i> Refresh
      </button>
    </div>

    <p class="section-label">ISS location</p>
    <div class="card">
      <div class="stat-grid">
        <div class="stat"><p class="stat-label">Latitude</p><p class="stat-value" id="iss-lat"><span class="loading">Loading…</span></p></div>
        <div class="stat"><p class="stat-label">Longitude</p><p class="stat-value" id="iss-lon"></p></div>
        <div class="stat"><p class="stat-label">Altitude</p><p class="stat-value" id="iss-alt"></p></div>
        <div class="stat"><p class="stat-label">Speed</p><p class="stat-value" id="iss-speed"></p></div>
      </div>
      <div class="map-container">
        <svg class="worldmap" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" id="world-svg">
          <rect width="800" height="400" fill="rgba(255,255,255,0.03)"/>
          <text x="400" y="200" text-anchor="middle" fill="#555" font-size="13">Loading map…</text>
        </svg>
      </div>
      <p class="hint">Positions update every ~10 seconds aboard the ISS</p>
    </div>

    <p class="section-label">Who's in space right now</p>
    <div class="card">
      <div class="crew-grid" id="crew-grid"><span class="loading">Loading…</span></div>
    </div>

    <p class="section-label">ISS passes over your location</p>
    <div class="card">
      <div class="pass-form">
        <input type="text" id="location-input" placeholder="City name or lat, lon (e.g. Denver or 39.7,-104.9)" />
        <button class="pass-btn" onclick="lookupPasses()"><i class="ti ti-satellite"></i> Find passes</button>
      </div>
      <div id="passes-result"></div>
    </div>

    <p class="section-label">NASA astronomy picture of the day</p>
    <div class="card" id="apod-card">
      <span class="loading">Loading…</span>
    </div>
  </div>

  <script>
    function initials(name) {
      return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
    }

    async function loadISS() {
      try {
        const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
        const d = await r.json();
        document.getElementById('iss-lat').textContent = d.latitude.toFixed(2) + '°';
        document.getElementById('iss-lon').textContent = d.longitude.toFixed(2) + '°';
        document.getElementById('iss-alt').textContent = Math.round(d.altitude) + ' km';
        document.getElementById('iss-speed').textContent = Math.round(d.velocity) + ' km/h';
        drawMap(d.latitude, d.longitude);
      } catch (e) {
        document.getElementById('iss-lat').innerHTML = '<span class="error">Unavailable</span>';
      }
    }

    function drawMap(lat, lon) {
      const svg = document.getElementById('world-svg');
      const W = 800, H = 400;
      const x = ((lon + 180) / 360) * W;
      const y = ((90 - lat) / 180) * H;

      svg.innerHTML = `
        <rect width="${W}" height="${H}" fill="rgba(255,255,255,0.02)" rx="6"/>
        <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        <line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
        ${[...Array(5)].map((_, i) => { const yy = H/6*(i+1); return `<line x1="0" y1="${yy}" x2="${W}" y2="${yy}" stroke="rgba(255,255,255,0.05)" stroke-width="0.3" stroke-dasharray="4,8"/>`; }).join('')}
        ${[...Array(7)].map((_, i) => { const xx = W/8*(i+1); return `<line x1="${xx}" y1="0" x2="${xx}" y2="${H}" stroke="rgba(255,255,255,0.05)" stroke-width="0.3" stroke-dasharray="4,8"/>`; }).join('')}
        <text x="4" y="14" fill="#555" font-size="10">90°N</text>
        <text x="4" y="${H/2 - 2}" fill="#555" font-size="10">0°</text>
        <text x="4" y="${H - 4}" fill="#555" font-size="10">90°S</text>
        <text x="2" y="${H - 4}" fill="#555" font-size="10" text-anchor="start">180°W</text>
        <text x="${W - 2}" y="${H - 4}" fill="#555" font-size="10" text-anchor="end">180°E</text>
        <circle cx="${x}" cy="${y}" r="12" fill="#E24B4A" opacity="0.2"/>
        <circle cx="${x}" cy="${y}" r="5" fill="#E24B4A"/>
        <text x="${x + 12}" y="${y + 4}" fill="#E24B4A" font-size="12" font-weight="500">ISS</text>
      `;
    }

    async function loadCrew() {
      try {
        const r = await fetch('http://api.open-notify.org/astros.json');
        const d = await r.json();
        const iss = d.people.filter(p => p.craft === 'ISS');
        const grid = document.getElementById('crew-grid');
        grid.innerHTML = iss.length
          ? iss.map(p => `
              <div class="crew-card">
                <div class="avatar">${initials(p.name)}</div>
                <p class="crew-name">${p.name}</p>
              </div>`).join('')
          : '<span class="loading">No ISS crew data found.</span>';
      } catch (e) {
        document.getElementById('crew-grid').innerHTML = '<span class="error">Could not load crew data.</span>';
      }
    }

    async function loadAPOD() {
      const card = document.getElementById('apod-card');
      try {
        const r = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
        const d = await r.json();
        const media = d.media_type === 'image'
          ? `<img src="${d.hdurl || d.url}" class="apod-img" alt="${d.title}" loading="lazy"/>`
          : `<p class="apod-desc">Today's entry is a video — <a href="${d.url}" target="_blank">watch it here</a>.</p>`;
        card.innerHTML = `
          <p class="apod-title">${d.title}</p>
          <p class="apod-date">${d.date}</p>
          ${media}
          <p class="apod-desc">${d.explanation.slice(0, 400)}…</p>
          ${d.copyright ? `<p class="apod-credit">Credit: ${d.copyright}</p>` : ''}
        `;
      } catch (e) {
        card.innerHTML = '<span class="error">Could not load NASA image.</span>';
      }
    }

    async function lookupPasses() {
      const input = document.getElementById('location-input').value.trim();
      const result = document.getElementById('passes-result');
      if (!input) return;
      result.innerHTML = '<span class="loading">Looking up location…</span>';

      let lat, lon, locationName;

      const coordMatch = input.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
      if (coordMatch) {
        lat = parseFloat(coordMatch[1]);
        lon = parseFloat(coordMatch[2]);
        locationName = `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      } else {
        try {
          const geo = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input)}&format=json&limit=1`);
          const gd = await geo.json();
          if (!gd.length) { result.innerHTML = '<span class="error">City not found. Try a different name or use lat, lon.</span>'; return; }
          lat = parseFloat(gd[0].lat);
          lon = parseFloat(gd[0].lon);
          locationName = gd[0].display_name.split(',').slice(0,2).join(',');
        } catch(e) {
          result.innerHTML = '<span class="error">Could not look up city. Try entering coordinates instead.</span>';
          return;
        }
      }

      result.innerHTML = '<span class="loading">Calculating passes…</span>';
      try {
        const r = await fetch(`https://api.wheretheiss.at/v1/satellites/25544/tles`);
        const tleData = await r.json();
        const passes = computePasses(tleData.header, tleData.tle1, tleData.tle2, lat, lon);
        if (!passes.length) {
          result.innerHTML = '<span class="loading">No passes found in the next 7 days.</span>';
          return;
        }
        result.innerHTML = `
          <p style="font-size:12px;color:#888;margin-bottom:10px;">Next passes over <strong style="color:#e8e8f0;">${locationName}</strong></p>
          <table class="pass-table">
            <thead><tr>
              <th>Date</th><th>Time (local)</th><th>Duration</th><th>Max elevation</th>
            </tr></thead>
            <tbody>${passes.slice(0,6).map(p => {
              const dt = new Date(p.time * 1000);
              const tag = p.maxEl >= 40 ? 'high' : p.maxEl >= 20 ? 'mid' : 'low';
              const label = p.maxEl >= 40 ? 'High' : p.maxEl >= 20 ? 'Medium' : 'Low';
              return `<tr>
                <td>${dt.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'})}</td>
                <td>${dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                <td>${Math.round(p.duration / 60)} min</td>
                <td><span class="pass-tag ${tag}">${label} (${Math.round(p.maxEl)}°)</span></td>
              </tr>`;
            }).join('')}</tbody>
          </table>
          <p style="font-size:11px;color:#555;margin-top:8px;">Elevation: how high the ISS gets above your horizon. Higher = easier to spot.</p>
        `;
      } catch(e) {
        result.innerHTML = '<span class="error">Could not calculate passes. Please try again.</span>';
      }
    }

    function computePasses(header, tle1, tle2, lat, lon) {
      const DEG = Math.PI / 180;
      const mu = 398600.4418;
      const Re = 6371;

      function parseTLE(t1, t2) {
        const inc = parseFloat(t2.substring(8,16)) * DEG;
        const raan = parseFloat(t2.substring(17,25)) * DEG;
        const eccStr = '0.' + t2.substring(26,33).trim();
        const ecc = parseFloat(eccStr);
        const argp = parseFloat(t2.substring(34,42)) * DEG;
        const M0 = parseFloat(t2.substring(43,51)) * DEG;
        const n = parseFloat(t2.substring(52,63)) * 2 * Math.PI / 86400;
        const epoch = tleEpoch(t1);
        return {inc, raan, ecc, argp, M0, n, epoch};
      }

      function tleEpoch(t1) {
        const y2 = parseInt(t1.substring(18,20));
        const yr = y2 < 57 ? 2000 + y2 : 1900 + y2;
        const day = parseFloat(t1.substring(20,32));
        const jan1 = Date.UTC(yr, 0, 1) / 1000;
        return jan1 + (day - 1) * 86400;
      }

      function solveKepler(M, e) {
        let E = M;
        for (let i = 0; i < 10; i++) E = M + e * Math.sin(E);
        return E;
      }

      function issECI(t, orb) {
        const dt = t - orb.epoch;
        const M = orb.M0 + orb.n * dt;
        const E = solveKepler(M % (2*Math.PI), orb.ecc);
        const nu = 2 * Math.atan2(Math.sqrt(1+orb.ecc)*Math.sin(E/2), Math.sqrt(1-orb.ecc)*Math.cos(E/2));
        const a = Math.pow(mu / (orb.n * orb.n / (2*Math.PI/86400 * 2*Math.PI/86400)), 1/3) * 1000;
        const r = a * (1 - orb.ecc * Math.cos(E)) / 1000;
        const u = nu + orb.argp;
        const x = r*(Math.cos(orb.raan)*Math.cos(u) - Math.sin(orb.raan)*Math.sin(u)*Math.cos(orb.inc));
        const y = r*(Math.sin(orb.raan)*Math.cos(u) + Math.cos(orb.raan)*Math.sin(u)*Math.cos(orb.inc));
        const z = r*(Math.sin(orb.inc)*Math.sin(u));
        return {x, y, z};
      }

      function elevation(t, orb, obsLat, obsLon) {
        const GMST0 = 280.46061837;
        const gmst = (GMST0 + 360.98564736629 * ((t - 946728000) / 86400)) * DEG;
        const theta = gmst + obsLon * DEG;
        const clat = Math.cos(obsLat * DEG), slat = Math.sin(obsLat * DEG);
        const cth = Math.cos(theta), sth = Math.sin(theta);
        const ox = Re * clat * cth, oy = Re * clat * sth, oz = Re * slat;
        const eci = issECI(t, orb);
        const dx = eci.x - ox, dy = eci.y - oy, dz = eci.z - oz;
        const rs = Math.sin(obsLat*DEG)*cth*dx + Math.sin(obsLat*DEG)*sth*dy - Math.cos(obsLat*DEG)*dz;
        const re2 = Math.cos(obsLat*DEG)*cth*dx + Math.cos(obsLat*DEG)*sth*dy + Math.sin(obsLat*DEG)*dz;
        const rn = -Math.sin(theta)*dx + Math.cos(theta)*dy;
        const range = Math.sqrt(dx*dx+dy*dy+dz*dz);
        const el = Math.asin((Math.cos(obsLat*DEG)*(cth*dx+sth*dy) + Math.sin(obsLat*DEG)*dz) / range) / DEG;
        return el;
      }

      const orb = parseTLE(tle1, tle2);
      const now = Math.floor(Date.now() / 1000);
      const step = 60;
      const passes = [];
      let inPass = false, passStart = 0, maxEl = 0, passMaxT = 0;

      for (let t = now; t < now + 7*86400; t += step) {
        const el = elevation(t, orb, lat, lon);
        if (el > 10) {
          if (!inPass) { inPass = true; passStart = t; maxEl = el; passMaxT = t; }
          else if (el > maxEl) { maxEl = el; passMaxT = t; }
        } else {
          if (inPass) {
            passes.push({ time: passStart, duration: t - passStart, maxEl });
            inPass = false; maxEl = 0;
          }
        }
      }
      return passes;
    }

    function loadAll() { loadISS(); loadCrew(); loadAPOD(); }
    loadAll();
  </script>
</body>
</html>
